<!DOCTYPE html>
<html>
<head>
    <title>Monthly Summary</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar">

    <h2>EMS</h2>

    <a href="dashboard.html">🏠 Dashboard</a>

    <a href="attendance.html">🕒 Attendance</a>

    <a href="leave.html">📄 Leave</a>

    <a href="monthly-summary.html">📊 Monthly</a>

    <a href="admin.html">⚙️ Admin</a>

    <a href="#" onclick="logout()">🚪 Logout</a>

</div>

<div class="main-content">


    <div class="dashboard">

        <h2>Monthly Attendance Summary</h2>

        <!-- FILTER -->

        <div class="card">

            <label>Select Month</label>

            <input type="number" id="month" min="1" max="12" placeholder="Enter month">

            <label>Select Year</label>

            <input type="number" id="year" placeholder="Enter year">

            <button onclick="loadSummary()">
                Get Summary
            </button>

        </div>


        <!-- SUMMARY -->

        <div class="card">

            <h3>Summary Details</h3>

            <br>

            <p><strong>Working Days:</strong> <span id="workingDays">0</span></p>

            <br>

            <p><strong>Approved Leave Days:</strong> <span id="leaveDays">0</span></p>

            <br>

            <p><strong>Effective Working Days:</strong> <span id="effectiveDays">0</span></p>

            <br>

            <p><strong>Present Days:</strong> <span id="presentDays">0</span></p>

            <br>

            <p><strong>Absent Days:</strong> <span id="absentDays">0</span></p>

            <br>

            <p><strong>Total Hours Worked:</strong> <span id="totalHours">0</span></p>

            <br>

            <p><strong>Attendance Percentage:</strong> <span id="attendancePercentage">0%</span></p>

        </div>

    </div>

</div>

<script src="js/auth.js"></script>
<script src="js/monthly-summary.js"></script>

</body>
</html>

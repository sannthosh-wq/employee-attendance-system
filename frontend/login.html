<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

<div class="container">
    <div class="auth-brand">
        <div class="auth-logo">EMS</div>
        <div>
            <h2>Sign In</h2>
            <p>Welcome back</p>
        </div>
    </div>

    <!-- LOGIN SWITCH -->
    <div class="login-switch">
        <button id="employeeBtn" class="active" onclick="setLoginType('employee')">
            Employee Login
        </button>

        <button id="adminBtn" onclick="setLoginType('admin')">
            Admin Login
        </button>
    </div>

    <div class="auth-fields">
        <input type="email" id="email" placeholder="Enter Email">
        <div class="password-field">
            <input type="password" id="password" placeholder="Enter Password">
            <button type="button" class="password-toggle" onclick="togglePassword('password', this)">Show</button>
        </div>
    </div>

    <button class="auth-primary" onclick="login()">Sign In</button>

    <p class="auth-link-row">
        <a href="forgot-password.html">Forgot password?</a>
    </p>

    <p class="auth-link-row">
        Don't have account?
        <a href="register.html">Register</a>
    </p>

</div>

<script src="js/auth.js"></script>
<script src="js/login.js"></script>

</body>
</html>

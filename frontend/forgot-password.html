<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

<div class="container">
    <div class="auth-brand">
        <div class="auth-logo">EMS</div>
        <div>
            <h2>Forgot Password</h2>
            <p>Reset your access</p>
        </div>
    </div>

    <div class="auth-fields">
        <input type="email" id="email" placeholder="Enter Email">
    </div>
    <button class="auth-primary" onclick="requestReset()">Get Reset Code</button>

    <div class="card" id="resetPanel" style="display: none;">
        <h3>Reset Password</h3>
        <p class="muted">Use this reset code within 15 minutes.</p>
        <input type="text" id="resetToken" placeholder="Reset Code">
        <div class="password-field">
            <input type="password" id="newPassword" placeholder="New Password">
            <button type="button" class="password-toggle" onclick="togglePassword('newPassword', this)">Show</button>
        </div>
        <button onclick="resetPassword()">Reset Password</button>
    </div>

    <p class="auth-link-row">
        Remembered it?
        <a href="login.html">Login</a>
    </p>
</div>

<script src="js/auth.js"></script>
<script src="js/forgot-password.js"></script>

</body>
</html>

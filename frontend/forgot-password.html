<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

<div class="container">
    <h2>Forgot Password</h2>
    <p>Enter your account email to generate a reset code.</p>

    <input type="email" id="email" placeholder="Enter Email">
    <button onclick="requestReset()">Get Reset Code</button>

    <div class="card" id="resetPanel" style="display: none;">
        <h3>Reset Password</h3>
        <p class="muted">Use this reset code within 15 minutes.</p>
        <input type="text" id="resetToken" placeholder="Reset Code">
        <input type="password" id="newPassword" placeholder="New Password">
        <button onclick="resetPassword()">Reset Password</button>
    </div>

    <p>
        Remembered it?
        <a href="login.html">Login</a>
    </p>
</div>

<script src="js/forgot-password.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Attendance History</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar">
    <h2>EMS</h2>
    <a href="dashboard.html" class="employee-dashboard-label">Employee Dashboard</a>
    <a href="employee-profile.html">Profile</a>
    <a href="punch.html">Punch In / Punch Out</a>
    <a href="attendance.html" class="active employee-attendance-label">Employee Attendance History</a>
    <a href="leave.html" class="employee-leave-label">Employee Apply Leave</a>
    <a href="monthly-summary.html">Monthly Attendance Summary</a>
    <a href="#" onclick="logout()">Logout</a>
</div>

<div class="main-content">
    <div class="dashboard">
        <div class="page-header">
            <div>
                <h1 id="attendancePageTitle">Employee Attendance History</h1>
                <p id="attendancePageSubtitle">Your previous punch in and punch out records.</p>
            </div>
        </div>

        <div class="card table-card">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Login Time</th>
                            <th>Logout Time</th>
                            <th>Total Hours</th>
                            <th>Late</th>
                            <th>Left Early</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="js/auth.js"></script>
